<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>marionettes — finger001</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Tamil:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:  #0d0d0d;
  --white:  #ffffff;
  --gray:   #666;
  --mid:    #999;
  --faint:  #c8c8c8;
  --line:   #e4e4e4;
  --font:   "DejaVu Sans Mono", "JetBrains Mono", "Cascadia Code", monospace;
  --title:  "Helvetica Neue", Helvetica, Arial, sans-serif;
  --header: 40px;
  --aside:  220px;
}

html, body {
  height: 100%;
  background: var(--white);
  color: var(--black);
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────── */

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header);
  background: var(--white);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  z-index: 200;
}

#header-logo {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  height: 38px;
  width: auto;
  display: block;
  pointer-events: auto;
}

#header-title {
  padding: 0 16px;
  font-family: "Tiro Tamil", serif;
  font-style: italic;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.02em;
  text-decoration: none;
  color: var(--black);
  border-right: 1px solid var(--line);
  height: 100%;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

#header-sub {
  padding: 0 14px;
  font-size: 10px;
  color: var(--mid);
  border-right: 1px solid var(--line);
  height: 100%;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

#header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 16px;
  font-size: 10px;
  color: var(--mid);
}

#install-link {
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: var(--mid);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
#install-link:hover { color: var(--black); }
#install-link svg { width: 14px; height: 14px; }

#ws-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--faint);
  margin-right: 5px;
  vertical-align: middle;
  transition: background 0.3s;
}
#ws-dot.connected { background: var(--black); }

/* ── Shell ───────────────────────────────────────────────────────────────── */

#shell {
  display: flex;
  position: fixed;
  top: var(--header);
  left: 0; right: 0; bottom: 0;
}

/* ── Canvas column ───────────────────────────────────────────────────────── */

#canvas-col {
  flex: 1;
  min-width: 0;
  position: relative;
  overflow: hidden;
  background: var(--white);
}

canvas#output {
  position: absolute;
  top: 0; left: 0;
  display: block;
}

#start-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font);
  font-size: 11px;
  border: 1px solid var(--black);
  background: transparent;
  cursor: pointer;
  padding: 9px 24px;
  color: var(--black);
  letter-spacing: 0.06em;
  z-index: 10;
}
#start-btn:hover { background: var(--line); }

/* ── Camera PiP ──────────────────────────────────────────────────────────── */

#pip {
  position: absolute;
  bottom: 16px;
  right: 16px;
  width: 220px;
  min-width: 100px;
  max-width: 560px;
  border: 1px solid var(--line);
  background: #f8f8f8;
  display: none;
  z-index: 10;
  overflow: hidden;
}

#pip-drag {
  position: absolute;
  top: 0; left: 0;
  width: 20px; height: 20px;
  cursor: nw-resize;
  z-index: 20;
}
#pip-drag::before {
  content: "";
  position: absolute;
  top: 4px; left: 4px;
  width: 7px; height: 7px;
  border-top: 1.5px solid var(--mid);
  border-left: 1.5px solid var(--mid);
}

#pip-video-wrap {
  position: relative;
  display: block;
}

#pip video {
  width: 100%;
  height: auto;
  display: block;
  transform: scaleX(-1);
}

#pip-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

#pip-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 3px 8px 4px;
  font-size: 9px;
  color: var(--mid);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-top: 1px solid var(--line);
}


#camera-wrap {
  position: relative;
  flex: 1;
  min-width: 0;
  border: 1px solid var(--line);
  padding: 1px 16px 1px 5px;
}
#camera-wrap::after {
  content: "▾";
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 8px;
  color: var(--mid);
  pointer-events: none;
}
#camera-select {
  width: 100%;
  font-family: var(--font);
  font-size: 9px;
  color: var(--mid);
  background: transparent;
  border: none;
  padding: 0;
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  text-overflow: ellipsis;
  overflow: hidden;
  letter-spacing: 0.05em;
}


/* ── Data aside ──────────────────────────────────────────────────────────── */

#data-col {
  width: var(--aside);
  min-width: var(--aside);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}

.section {
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.section-head {
  padding: 7px 14px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--mid);
  border-bottom: 1px solid var(--line);
}

.finger-row {
  display: grid;
  grid-template-columns: 46px 1fr 1fr 1fr;
  padding: 5px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 9.5px;
}
.finger-row:last-child { border-bottom: none; }

.fname { color: var(--faint); }
.fname.on { color: var(--black); }

.fval {
  color: var(--faint);
  text-align: right;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.fval.on { color: var(--gray); }

.no-hand {
  padding: 9px 14px;
  font-size: 9.5px;
  color: var(--faint);
}

/* ── Settings ────────────────────────────────────────────────────────────── */

#settings-body {
  padding: 10px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.s-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 9.5px;
}

.s-label {
  color: var(--gray);
  width: 60px;
  flex-shrink: 0;
}

.s-val {
  color: var(--black);
  font-variant-numeric: tabular-nums;
  width: 26px;
  text-align: right;
  flex-shrink: 0;
}

.s-text { color: var(--mid); font-size: 9.5px; }

.tip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 13px; height: 13px;
  border: 1px solid var(--line);
  border-radius: 50%;
  font-size: 8px;
  color: var(--mid);
  cursor: help;
  position: relative;
  flex-shrink: 0;
}
.tip-text {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: calc(100% + 5px);
  width: 110px;
  background: var(--black);
  color: var(--white);
  padding: 6px 9px;
  font-size: 9px;
  line-height: 1.5;
  white-space: normal;
  text-align: center;
  z-index: 100;
  pointer-events: none;
}
.tip:hover .tip-text { display: block; }

input[type="range"] {
  flex: 1;
  accent-color: var(--black);
  cursor: pointer;
}

.btn {
  font-family: var(--font);
  font-size: 9.5px;
  border: 1px solid var(--black);
  background: transparent;
  cursor: pointer;
  padding: 3px 10px;
  color: var(--black);
  letter-spacing: 0.04em;
}
.btn:hover:not(:disabled) { background: var(--line); }
.btn.running  { background: var(--black); color: var(--white); cursor: default; }
.btn:disabled { opacity: 0.4; cursor: default; }


::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); }
</style>

<header id="header">

    <a id="install-link" href="/install.html" title="Install instructions">

<div id="shell">

    <div id="pip">

        <div class="s-row">
          <span class="s-label">smoothing</span>
          <input type="range" id="smoothing" min="0" max="1" step="0.02" value="0.5">
          <span class="s-val" id="smooth-val">1.26</span>
        </div>

        <div class="s-row">
          <span class="s-label">curl</span>
          <input type="range" id="curl" min="0" max="1" step="0.05" value="0">
          <span class="s-val" id="curl-val">0.00</span>

        <div class="s-row">
          <span class="s-label">port</span>
          <input type="number" id="relay-port" value="8765" min="1024" max="65535"
                 style="width:54px;font-family:var(--font);font-size:9.5px;border:1px solid var(--line);padding:2px 5px;background:transparent;color:var(--black);outline:none;">
          <span class="tip">?<span class="tip-text">Must match WS Port in Blender → Marionette → Connection, or Strings → WS Port</span></span>
        </div>


      </div>
    </div>


  </aside>
</div>

<script type="module">
import { HandLandmarker, FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/vision_bundle.mjs";

// ── Config ────────────────────────────────────────────────────────────────────

const FINGERS     = ["thumb", "index", "middle", "ring", "pinky"];
const FINGER_TIPS = { thumb: 4, index: 8, middle: 12, ring: 16, pinky: 20 };
const FINGER_PIP  = { thumb: 3, index: 6, middle: 10, ring: 14, pinky: 18 };

// Palm polygon: wrist → thumb CMC → index base → ... → pinky base → close
const PALM_POLY = [0, 1, 5, 9, 13, 17];

// Finger bone segments (above the palm knuckle line)
const BONES = [
  [1, 2],[2, 3],[3, 4],          // thumb
  [5, 6],[6, 7],[7, 8],          // index
  [9, 10],[10, 11],[11, 12],     // middle
  [13, 14],[14, 15],[15, 16],    // ring
  [17, 18],[18, 19],[19, 20],    // pinky
];

// Teenage Engineering palette — one colour per finger, consistent across both hands
const FINGER_COLORS = {
  thumb:  "#FF6B00",  // TE orange
  index:  "#00C8FF",  // cyan
  middle: "#4CD964",  // lime
  ring:   "#FF2D55",  // pink
  pinky:  "#FFCC00",  // yellow
};

function getRelayURL() {
  const port = document.getElementById("relay-port")?.value || "8765";
  return `ws://localhost:${port}`;
}

// ── One Euro Filter ───────────────────────────────────────────────────────────
// Adaptive low-pass filter: heavy smoothing when still, light when moving fast.
// Ref: Casiez et al. "1€ Filter" CHI 2012.

class OneEuroFilter {
  constructor(minCutoff = 0.5, beta = 0.8, dCutoff = 1.0) {
    this.minCutoff = minCutoff;
    this.beta      = beta;
    this.dCutoff   = dCutoff;
    this._x  = null;
    this._dx = 0;
    this._ts = null;
  }
  _alpha(cutoff, dt) {
    const r = 2 * Math.PI * cutoff * dt;
    return r / (r + 1);
  }
  filter(x, ts) {
    if (this._x === null) { this._x = x; this._ts = ts; return x; }
    const dt  = Math.max((ts - this._ts) / 1000, 1e-4);
    this._ts  = ts;
    const dxRaw = (x - this._x) / dt;
    this._dx    = this._alpha(this.dCutoff, dt) * dxRaw + (1 - this._alpha(this.dCutoff, dt)) * this._dx;
    const cutoff = this.minCutoff + this.beta * Math.abs(this._dx);
    this._x = this._alpha(cutoff, dt) * x + (1 - this._alpha(cutoff, dt)) * this._x;
    return this._x;
  }
}

// ── State ─────────────────────────────────────────────────────────────────────

let landmarker     = null;
let faceLandmarker = null;
let ws          = null;
let running     = false;
let minCutoff   = 1.26;  // Hz — lower = smoother when still, higher = more responsive
const BETA      = 0.8;   // speed coefficient — keeps fast movements lag-free
const filterMap = new Map(); // "${hand}_${name}_${axis}" → OneEuroFilter
let fps = 0, prevTs = 0;
let debugMode = false;

function getFilter(hand, name, axis) {
  const key = `${hand}_${name}_${axis}`;
  if (!filterMap.has(key)) filterMap.set(key, new OneEuroFilter(minCutoff, BETA));
  return filterMap.get(key);
}

// ── Log flush (POST /log every 200 ms) ───────────────────────────────────────

let _logBuf   = [];
let _logTimer = null;

function queueLog(frame) {
  _logBuf.push(frame);
  if (!_logTimer) _logTimer = setTimeout(_flushLog, 200);
}

function _flushLog() {
  _logTimer = null;
  if (!_logBuf.length) return;
  const batch = _logBuf.splice(0);
  fetch("/log", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(batch),
  }).then(() => setDot(true)).catch(() => setDot(false));
}

function setDot(ok) {
  document.getElementById("ws-dot").className = ok ? "connected" : "";
}

// ── WebSocket (optional — only needed for Blender relay) ─────────────────────

function connectWS() {
  try {
    ws = new WebSocket(getRelayURL());
    ws.onopen  = () => {};
    ws.onclose = () => { setTimeout(connectWS, 2000); };
    ws.onerror = () => {};
  } catch (_) {
    setTimeout(connectWS, 2000);
  }
}

function sendRelay(packet) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(packet));
}

// ── MediaPipe ─────────────────────────────────────────────────────────────────

// Inner lip landmarks for MAR: upper=13, lower=14, left corner=78, right corner=308
const MOUTH_TOP = 13, MOUTH_BOT = 14, MOUTH_L = 78, MOUTH_R = 308;

function mouthAspectRatio(lms) {
  const dy = lms[MOUTH_BOT].y - lms[MOUTH_TOP].y;
  const dx = lms[MOUTH_R].x  - lms[MOUTH_L].x;
  return dx > 0 ? dy / dx : 0;
}

async function initLandmarker() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/wasm"
  );
  landmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 2,
    minHandDetectionConfidence: 0.3,
    minHandPresenceConfidence:  0.2,
    minTrackingConfidence:      0.4,
  });
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numFaces: 1,
    minFaceDetectionConfidence: 0.5,
    minTrackingConfidence:      0.5,
  });
}

// ── Camera ────────────────────────────────────────────────────────────────────

async function openCamera(deviceId) {
  const video = document.getElementById("video");
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  const constraints = { video: {
    width: { ideal: 1920 }, height: { ideal: 1080 },
    ...(deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "user" }),
  }};
  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  await new Promise(r => (video.onloadeddata = r));
  await populateCameraSelect(deviceId);
}

async function populateCameraSelect(activeDeviceId) {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cameras = devices.filter(d => d.kind === "videoinput");
  const sel = document.getElementById("camera-select");
  sel.innerHTML = cameras.map((d, i) => {
    const label = (d.label || `Camera ${i + 1}`).replace(/\s*\([0-9a-f:]+\)\s*$/i, "").trim();
    return `<option value="${d.deviceId}"${d.deviceId === activeDeviceId ? " selected" : ""}>${label}</option>`;
  }).join("");
}

async function startCamera() {
  await openCamera(null);
  document.getElementById("pip").style.display = "block";
  running = true;
  requestAnimationFrame(loop);
}

// ── Extended finger detection ─────────────────────────────────────────────────

let curlThreshold = 0.0;

function extendedFingers(lms) {
  const w = lms[0];
  const ext = new Set();
  for (const [name, tipIdx] of Object.entries(FINGER_TIPS)) {
    const pipIdx = FINGER_PIP[name];
    const tip = lms[tipIdx], pip = lms[pipIdx];
    const tipD = Math.hypot(tip.x - w.x, tip.y - w.y, tip.z - w.z);
    const pipD = Math.hypot(pip.x - w.x, pip.y - w.y, pip.z - w.z);
    if (tipD > pipD * curlThreshold) ext.add(name);
  }
  return ext;
}

// ── Drawing ───────────────────────────────────────────────────────────────────

function px(lm, W, H) {
  // Mirror x so display matches how you see your own hand
  return [(1 - lm.x) * W, lm.y * H];
}

function drawHand(ctx, lms, ext, W, H) {
  // 1. Palm polygon (filled silhouette)
  ctx.beginPath();
  for (let i = 0; i < PALM_POLY.length; i++) {
    const [x, y] = px(lms[PALM_POLY[i]], W, H);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle   = "#f4f4f4";
  ctx.fill();
  ctx.strokeStyle = "#0d0d0d";
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // 2. Finger bones
  ctx.strokeStyle = "#0d0d0d";
  ctx.lineWidth   = 1.5;
  for (const [a, b] of BONES) {
    const [ax, ay] = px(lms[a], W, H);
    const [bx, by] = px(lms[b], W, H);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
  }

  // 3. All joints
  for (let j = 0; j < lms.length; j++) {
    const [x, y] = px(lms[j], W, H);
    const r = j === 0 ? 5 : 3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle   = "#ffffff";
    ctx.fill();
    ctx.strokeStyle = "#0d0d0d";
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // 4. Debug: visibility score next to every joint
  if (debugMode) {
    ctx.font      = '8px "DejaVu Sans Mono", monospace';
    for (let j = 0; j < lms.length; j++) {
      const lm = lms[j];
      const v  = lm.visibility ?? lm.presence;
      if (v == null) continue;
      const [x, y] = px(lm, W, H);
      ctx.fillStyle = "#999";
      ctx.fillText(v.toFixed(2), x + 6, y + 3);
    }
  }

  // 5. Extended fingertips: solid black dot + name label
  ctx.font      = '9px "DejaVu Sans Mono", monospace';
  for (const [name, idx] of Object.entries(FINGER_TIPS)) {
    if (!ext.has(name)) continue;
    const [x, y] = px(lms[idx], W, H);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = "#0d0d0d";
    ctx.fill();
    ctx.fillStyle = "#0d0d0d";
    ctx.fillText(name, x + 9, y - 2);
  }
}

// ── Data panel ────────────────────────────────────────────────────────────────

function renderData(side, positions, ext) {
  const el = document.getElementById(side.toLowerCase() + "-data");
  if (!positions) {
    el.innerHTML = '<div class="no-hand">no hand</div>';
    return;
  }
  const fmt = v => v !== undefined ? v.toFixed(3) : "  — ";
  el.innerHTML = FINGERS.map(name => {
    const pos = positions[name];
    const on  = ext.has(name);
    return `<div class="finger-row">
      <span class="fname${on ? " on" : ""}">${name}</span>
      <span class="fval${on ? " on" : ""}">${fmt(pos?.[0])}</span>
      <span class="fval${on ? " on" : ""}">${fmt(pos?.[1])}</span>
      <span class="fval${on ? " on" : ""}">${fmt(pos?.[2])}</span>
    </div>`;
  }).join("");
}

// ── PiP overlay ───────────────────────────────────────────────────────────────

function drawPipOnCtx(ctx, allLms, W, H) {
  for (const lms of allLms) {
    ctx.strokeStyle = "rgba(13,13,13,0.3)";
    ctx.lineWidth   = Math.max(1, W / 300);
    for (const [a, b] of BONES) {
      ctx.beginPath();
      ctx.moveTo((1 - lms[a].x) * W, lms[a].y * H);
      ctx.lineTo((1 - lms[b].x) * W, lms[b].y * H);
      ctx.stroke();
    }
    const r = Math.max(3, W / 80);
    for (const [name, idx] of Object.entries(FINGER_TIPS)) {
      const lm = lms[idx];
      ctx.beginPath();
      ctx.arc((1 - lm.x) * W, lm.y * H, r, 0, Math.PI * 2);
      ctx.fillStyle = FINGER_COLORS[name];
      ctx.fill();
    }
  }
}

function drawPip(allFilteredLms) {
  const pc  = document.getElementById("pip-canvas");
  const ctx = pc.getContext("2d");
  const W = pc.width, H = pc.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  drawPipOnCtx(ctx, allFilteredLms, W, H);
}

// ── Main loop ─────────────────────────────────────────────────────────────────

function loop(ts) {
  if (!running) return;
  requestAnimationFrame(loop);

  const video = document.getElementById("video");
  if (video.readyState < 2) return;

  const dt = ts - prevTs;
  fps    = dt > 0 ? fps * 0.88 + (1000 / dt) * 0.12 : fps;
  prevTs = ts;
  document.getElementById("fps-label").textContent = Math.round(fps) + " fps";

  const results = landmarker.detectForVideo(video, ts);
  const canvas  = document.getElementById("output");
  const ctx     = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  const relayPacket    = {};
  const logFrame       = { ts };
  const handPos        = { Left: null, Right: null };
  const handExt        = { Left: new Set(), Right: new Set() };
  const pipLandmarks   = [];
  let handsDetected    = false;

  if (results.landmarks) {
    for (let i = 0; i < results.landmarks.length; i++) {
      const lms  = results.landmarks[i];
      const hand = results.handedness[i][0].categoryName;
      const ext  = extendedFingers(lms);

      handExt[hand] = ext;
      handPos[hand] = {};
      handsDetected  = true;

      // Filter all 21 landmarks for drawing (previously drawn raw — source of visible jitter)
      const filteredLms = lms.map((lm, j) => ({
        x: getFilter(hand, `j${j}`, 0).filter(lm.x, ts),
        y: getFilter(hand, `j${j}`, 1).filter(lm.y, ts),
        z: getFilter(hand, `j${j}`, 2).filter(lm.z, ts),
        visibility: lm.visibility,
        presence:   lm.presence,
      }));

      pipLandmarks.push(filteredLms);
      drawHand(ctx, filteredLms, ext, W, H);

      for (const [name, idx] of Object.entries(FINGER_TIPS)) {
        const lm   = lms[idx];
        const vis  = lm.visibility ?? lm.presence ?? 1.0;
        const filt = [filteredLms[idx].x, filteredLms[idx].y, filteredLms[idx].z];
        const key  = `${hand.toLowerCase()}_${name}`;
        handPos[hand][name] = filt;
        if (ext.has(name)) relayPacket[key] = filt;
        logFrame[key] = [lm.x, lm.y, lm.z, ...filt, vis];
      }
    }
  }

  drawPip(pipLandmarks);

  if (faceLandmarker) {
    const faceResults = faceLandmarker.detectForVideo(video, ts);
    if (faceResults.faceLandmarks && faceResults.faceLandmarks.length > 0) {
      const mar = mouthAspectRatio(faceResults.faceLandmarks[0]);
      relayPacket["__mouth"] = mar;
      const mouthVal   = document.getElementById("mouth-val");
      const mouthLabel = document.getElementById("mouth-label");
      mouthVal.textContent  = mar.toFixed(3);
      mouthVal.className    = "fval on";
      mouthLabel.className  = "fname on";
    } else {
      document.getElementById("mouth-val").textContent = "—";
      document.getElementById("mouth-val").className   = "fval";
      document.getElementById("mouth-label").className = "fname";
    }
  }

  sendRelay(relayPacket);
  if (handsDetected) queueLog(logFrame);
  renderData("Left",  handPos.Left,  handExt.Left);
  renderData("Right", handPos.Right, handExt.Right);
}

// ── Canvas resize ─────────────────────────────────────────────────────────────

function resizeCanvas() {
  const col    = document.getElementById("canvas-col");
  const canvas = document.getElementById("output");
  const w = col.clientWidth, h = col.clientHeight;
  if (w > 0 && h > 0) { canvas.width = w; canvas.height = h; }
}

new ResizeObserver(resizeCanvas).observe(document.getElementById("canvas-col"));

// Keep pip-canvas pixel dimensions in sync with the video's rendered size
const pipCanvas = document.getElementById("pip-canvas");
new ResizeObserver(() => {
  const video = document.getElementById("video");
  pipCanvas.width  = video.clientWidth;
  pipCanvas.height = video.clientHeight;
}).observe(document.getElementById("video"));

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById("debug-btn").addEventListener("click", function () {
  debugMode = !debugMode;
  this.textContent = debugMode ? "on" : "off";
  this.classList.toggle("running", debugMode);
});

document.getElementById("curl").addEventListener("input", e => {
  curlThreshold = parseFloat(e.target.value);
  document.getElementById("curl-val").textContent = curlThreshold.toFixed(2);
});

document.getElementById("smoothing").addEventListener("input", e => {
  // Slider 0→1 maps to minCutoff 2.5→0.08 on a log curve.
  // Right = smoother when still. Left = more responsive.
  const v = parseFloat(e.target.value);
  // v=0 → 15 Hz (near-raw), v=0.5 → 1.26 Hz (default), v=1 → 0.10 Hz (very heavy)
  minCutoff = 15 * Math.pow(0.007, v);
  filterMap.forEach(f => { f.minCutoff = minCutoff; });
  document.getElementById("smooth-val").textContent = minCutoff.toFixed(2);
});

document.getElementById("start-btn").addEventListener("click", async function () {
  this.textContent = "loading…";
  this.disabled    = true;
  try {
    await initLandmarker();
    await startCamera();
    this.style.display = "none";
  } catch (err) {
    this.textContent = "retry";
    this.disabled    = false;
    console.error(err);
  }
});

document.getElementById("relay-port").addEventListener("change", () => {
  if (ws) ws.onclose = null, ws.close();
  connectWS();
});

document.getElementById("camera-select").addEventListener("change", async e => {
  await openCamera(e.target.value);
});

// ── PiP drag-to-resize (top-left handle, anchored bottom-right) ───────────────

document.getElementById("pip-drag").addEventListener("mousedown", e => {
  e.preventDefault();
  const pip    = document.getElementById("pip");
  const startX = e.clientX;
  const startW = pip.offsetWidth;

  const onMove = e => {
    const w = Math.max(100, Math.min(560, startW + (startX - e.clientX)));
    pip.style.width = w + "px";
  };
  const onUp = () => {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup",   onUp);
  };
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup",   onUp);
});


connectWS();
</script>
</body>
